{% extends 'blog/base.html' %}
{% block content %}
<div class="card" style="max-width:400px;margin:0 auto">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p style="margin-top:1rem">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
